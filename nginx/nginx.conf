worker_processes  1;

events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile        on;
  keepalive_timeout  65;
  resolver 127.0.0.11 valid=10s ipv6=off;

  server {
    listen 80;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location /events/ {
      set $events_upstream events_api:8000;
      proxy_pass http://$events_upstream;
    }
    location /auth/ {
      set $auth_upstream auth_api:8000;
      proxy_pass http://$auth_upstream;
    }
    location /downtime/ {
      set $downtime_upstream downtime_service:8000;
      proxy_pass http://$downtime_upstream;
    }
    location /reports/ {
      proxy_buffering off;
      proxy_cache off;
      set $reports_upstream reports_api:8000;
      proxy_pass http://$reports_upstream;
    }
    location /api/admin/ {
      set $admin_upstream admin_api:8000;
      proxy_pass http://$admin_upstream;
    }
    location /admin/api/ {
      rewrite ^/admin/api/(.*)$ /api/admin/$1 break;
      set $admin_api_upstream admin_api:8000;
      proxy_pass http://$admin_api_upstream;
    }
    location /admin/ui/ {
      rewrite ^/admin/ui/(.*)$ /admin/$1 break;
      set $admin_ui_upstream admin_api:8000;
      proxy_pass http://$admin_ui_upstream;
    }
    location /admin/ {
      set $admin_root_upstream admin_api:8000;
      proxy_pass http://$admin_root_upstream;
    }
    location /static/admin/ {
      set $admin_static_upstream admin_api:8000;
      proxy_pass http://$admin_static_upstream;
    }

    location /health {
      return 200 'ok';
      add_header Content-Type text/plain;
    }

    location / {
      set $frontend_upstream frontend:5173;
      proxy_pass http://$frontend_upstream;
    }
  }
}

